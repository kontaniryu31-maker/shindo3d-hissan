/* ===== 立体（アイソメ） ===== */
const CW = 130, CH = 54, GX = 4, HEADER = 58, DEEP = 120;
const N = STAGES.length;
const FW = N * CW + (N - 1) * GX;
const FH = HEADER + DEPTH.length * CH;
const ZX = 0.62, ZY = -0.45;
const px = (x, y, z) => ({ left: x + z * ZX, top: y + z * ZY });
const OX = 180, OY = 116;
// 実際の描画域（左の深度ラベル px(-150) 〜 右の奥行き/ラベルまで）。これで縮小率を計算する
// 中身の実寸（横≒30〜940 / 縦≒40〜402）に合わせて余白を切り詰め、箱を大きく見せる
const DRAW_W = 980, DRAW_H = 430;
const wrap = (p) => ({ left: OX + p.left, top: OY + p.top });

const STORE_KEY = "shindo3d_hissan_v6"; // ★単元ごとに変える（別単元へ流用時は名前を変えて 保存の混在を防ぐ）

/* window.storage が無い環境でも落ちない安全ラッパ */
const hasStore = typeof window !== "undefined" && window.storage &&
  typeof window.storage.get === "function";
const store = {
  async get(k) { if (!hasStore) return null; try { return await window.storage.get(k); } catch (e) { return null; } },
  async set(k, v) { if (!hasStore) return; try { await window.storage.set(k, v); } catch (e) {} },
  async del(k) { if (!hasStore) return; try { await window.storage.delete(k); } catch (e) {} },
};

function App() {
  const [openStage, setOpenStage] = useState(1);
  const [openLv, setOpenLv] = useState(0);       // どのマスを開いているか（既定はLv1「読む」＝学習の入口）
  const [done, setDone] = useState({});           // "s-k": true（ぬったマス）
  const [showBack, setShowBack] = useState(false); // つなげる裏面
  const [activeCard, setActiveCard] = useState("dec"); // つなげる先カード
  const [showPBL, setShowPBL] = useState(false);   // PBL画面（お買いもの）
  const [showBattle, setShowBattle] = useState(false); // PBL（モンスターバトル）
  const [showCipher, setShowCipher] = useState(false); // PBL（暗号たんてい）
  const [budget, setBudget] = useState(5000);       // 予算（自分で設定）
  const [cart, setCart] = useState({});             // {itemId: 個数}
  const [loaded, setLoaded] = useState(false);

  // 立体シーンをコンテナ幅に合わせて自動縮小（はみ出し防止）
  const sceneBoxRef = useRef(null);
  const [fit, setFit] = useState(1);
  useEffect(() => {
    const el = sceneBoxRef.current;
    if (!el) return;
    const calc = () => {
      const w = el.clientWidth;
      setFit(Math.min(1.3, w / DRAW_W));
    };
    calc();
    let ro;
    if (typeof ResizeObserver !== "undefined") {
      ro = new ResizeObserver(calc);
      ro.observe(el);
    } else {
      window.addEventListener("resize", calc);
    }
    return () => { if (ro) ro.disconnect(); else window.removeEventListener("resize", calc); };
  }, []);

  /* ===== 永続保存：読み込み ===== */
  useEffect(() => {
    let alive = true;
    (async () => {
      const r = await store.get(STORE_KEY);
      if (alive && r && r.value) {
        try {
          const v = JSON.parse(r.value);
          setDone(v.done || {});
        } catch (e) { /* 壊れていたら無視 */ }
      }
      if (alive) setLoaded(true);
    })();
    return () => { alive = false; };
  }, []);
  /* ===== 永続保存：書き込み ===== */
  useEffect(() => {
    if (!loaded) return;
    store.set(STORE_KEY, JSON.stringify({ done }));
  }, [done, loaded]);

  const toggleDone = (s, k) => setDone((d) => ({ ...d, [`${s}-${k}`]: !d[`${s}-${k}`] }));
  const resetAll = async () => {
    setDone({});
    await store.del(STORE_KEY);
  };

  const st = STAGES.find((s) => s.n === openStage);
  const plan = (PLAN[openStage] && PLAN[openStage][openLv]) ? PLAN[openStage][openLv] : { ready: false };
  const showGuide = openLv != null;

  // 箱頂点
  const A = px(-20, -20, 0), B = px(FW + 20, -20, 0), Cc = px(FW + 20, FH + 20, 0), D = px(-20, FH + 20, 0);
  const A2 = px(-20, -20, DEEP), B2 = px(FW + 20, -20, DEEP), C2 = px(FW + 20, FH + 20, DEEP), D2 = px(-20, FH + 20, DEEP);

  return (
    <div style={{
      fontFamily: "'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif",
      background: "radial-gradient(1200px 700px at 78% -8%, #E6F5F7 0%, #EEF6F7 45%, #E8F0F1 100%)",
      minHeight: "100vh", color: INK, padding: "16px 18px 26px", boxSizing: "border-box",
    }}>
      <style>{`@keyframes popUp{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cellPop{0%{transform:scale(1)}45%{transform:scale(1.07)}100%{transform:scale(1)}}`}</style>
      {/* ヘッダー */}
      <div style={{ display: "flex", alignItems: "center", gap: 13, flexWrap: "wrap" }}>
        <div style={{ width: 46, height: 46, borderRadius: 12, background: BLUE, color: "#fff", fontWeight: 900, fontSize: 16, display: "grid", placeItems: "center", flex: "none", boxShadow: "0 5px 0 rgba(46,145,168,.3)" }}>3D</div>
        <div style={{ flex: 1, minWidth: 240 }}>
          <div style={{ fontSize: 22, fontWeight: 900, color: BLUE, lineHeight: 1.05 }}>3D 自由進度表</div>
          <div style={{ fontSize: 12.5, fontWeight: 800, marginTop: 2 }}>たんげん：<span style={{ color: BLUE }}>{UNIT}</span></div>
          <div style={{ fontSize: 10, fontWeight: 700, color: SUB, marginTop: 1 }}>{BOOK}　／　いちばん大事：{CORE}</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "flex-end" }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: SUB, textAlign: "right", lineHeight: 1.5 }}>
            <span style={{ color: BLUE }}>━</span>すすむ　<span style={{ color: AMBER_MAIN }}>━</span>ふかめる（わかりの ふかさ）　<span style={{ color: GREEN_TX }}>━</span>つなげる
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => { setShowPBL(true); setShowBack(false); }} style={{
              fontSize: 11.5, fontWeight: 900, cursor: "pointer", padding: "5px 13px", borderRadius: 13,
              color: "#fff", background: "#7E54C4", border: "none",
              boxShadow: "0 2px 0 rgba(126,84,196,.3)",
            }}>🛒 お買いもの大さくせん</button>
            <button onClick={() => { setShowBattle(true); setShowBack(false); }} style={{
              fontSize: 11.5, fontWeight: 900, cursor: "pointer", padding: "5px 13px", borderRadius: 13,
              color: "#fff", background: BATTLE_COLOR, border: "none", boxShadow: "0 2px 0 rgba(180,60,45,.3)",
            }}>⚔️ モンスターバトル</button>
            <button onClick={() => { setShowCipher(true); setShowBack(false); }} style={{
              fontSize: 11.5, fontWeight: 900, cursor: "pointer", padding: "5px 13px", borderRadius: 13,
              color: "#fff", background: DETECTIVE_COLOR, border: "none", boxShadow: "0 2px 0 rgba(50,65,120,.3)",
            }}>🕵️ 暗号たんてい</button>
            <button onClick={() => { setShowBack((v) => !v); }} style={{
              fontSize: 11.5, fontWeight: 900, cursor: "pointer", padding: "5px 13px", borderRadius: 13,
              color: "#fff", background: GREEN, border: "none", boxShadow: "0 2px 0 rgba(63,169,140,.3)",
            }}>{showBack ? "◀ おもてに もどる" : "つなげる（うらを見る）↗"}</button>
            <button onClick={resetAll} style={{ fontSize: 11, fontWeight: 800, cursor: "pointer", padding: "5px 11px", borderRadius: 13, color: SUB, background: "#fff", border: "1.5px solid #cdd8dd" }}>リセット</button>
          </div>
        </div>
      </div>

      {/* ===== 上段：立体ビュー ===== */}
      <div ref={sceneBoxRef} style={{
        marginTop: 10, height: DRAW_H * fit, borderRadius: 16, border: "1px solid #e1e8ea",
        background: "linear-gradient(180deg,#FBFEFE,#E9F4F6)", position: "relative", overflow: "hidden", perspective: 1500,
      }}>
        {/* fitスケール用ラッパ（実描画域 DRAW_W×DRAW_H を中央に置いて縮小） */}
        <div style={{ position: "absolute", left: "50%", top: 0, width: DRAW_W, height: DRAW_H, transform: `translateX(-50%) scale(${fit})`, transformOrigin: "top center" }}>
        {/* 回転ステージ（C案：showBackでrotateY） */}
        <div style={{
          position: "absolute", inset: 0, transformStyle: "preserve-3d",
          transform: showBack ? "rotateY(-180deg) rotateX(-8deg)" : "rotateY(0deg)",
          transition: "transform .8s cubic-bezier(.3,.7,.2,1)",
        }}>
          {/* ---------- おもて面 ---------- */}
          <div style={{ position: "absolute", inset: 0, backfaceVisibility: "hidden" }}>
            <svg width="100%" height="100%" style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
              {[[A2, B2], [B2, C2], [C2, D2], [D2, A2], [A, A2], [B, B2], [Cc, C2], [D, D2]].map(([p, q], i) => (
                <line key={i} x1={OX + p.left} y1={OY + p.top} x2={OX + q.left} y2={OY + q.top} stroke="#c2d2d8" strokeWidth="1.6" strokeDasharray="3,4" />
              ))}
              {[[A, B], [B, Cc], [Cc, D], [D, A]].map(([p, q], i) => (
                <line key={"f" + i} x1={OX + p.left} y1={OY + p.top} x2={OX + q.left} y2={OY + q.top} stroke="#9fb6bd" strokeWidth="2" />
              ))}
              {(() => {
                // 原点を箱の左上の少し外に。終点は枠内に収める
                const o = px(-46, -46, 0);
                const ox = px(FW + 14, -46, 0);          // すすむ＝右（横）
                const oy = px(-46, FH + 22, 0);           // ふかめる＝下（縦）
                const oz = px(-46, -46, DEEP * 0.5);      // つなげる＝奥（短め）
                const L = (p, q, col) => <line x1={OX + p.left} y1={OY + p.top} x2={OX + q.left} y2={OY + q.top} stroke={col} strokeWidth="3.5" strokeLinecap="round" markerEnd={`url(#ah-${col.replace('#','')})`} />;
                const mk = (col) => <marker id={`ah-${col.replace('#','')}`} markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="11" refX="4" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill={col} /></marker>;
                return (<>
                  <defs>{mk(BLUE)}{mk(AMBER_MAIN)}{mk(GREEN)}</defs>
                  {L(o, ox, BLUE)}{L(o, oy, AMBER_MAIN)}{L(o, oz, GREEN)}
                </>);
              })()}
            </svg>
            {(() => {
              const labelShadow = "0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff, 1px 1px 2px #fff";
              const ox = wrap(px(FW - 82, -64, 0));        // すすむ：線の上・右寄り
              const oy = wrap(px(-122, FH + 12, 0));        // ふかめる：線の左下
              const oz = wrap(px(-30, -44, DEEP * 0.5));    // つなげる：短い線の先
              const base = { position: "absolute", fontSize: 13, fontWeight: 900, whiteSpace: "nowrap", textShadow: labelShadow };
              return (<>
                <div style={{ ...base, ...ox, color: BLUE }}>すすむ →</div>
                <div style={{ ...base, ...oy, color: AMBER_MAIN }}>ふかめる ↓</div>
                <div style={{ ...base, ...oz, color: GREEN_TX }}>つなげる ↗</div>
              </>);
            })()}
            {/* 上面・右側面 */}
            <svg width="100%" height="100%" style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
              {(() => { const tl = px(-20, -20, 0), tr = px(FW + 20, -20, 0), tr2 = px(FW + 20, -20, DEEP), tl2 = px(-20, -20, DEEP);
                return <polygon points={[tl, tr, tr2, tl2].map(p => `${OX + p.left},${OY + p.top}`).join(" ")} fill="rgba(58,123,213,.06)" stroke="#bcd0d7" strokeWidth="1.4" />; })()}
              {(() => { const a = px(FW + 20, -20, 0), b = px(FW + 20, FH + 20, 0), c = px(FW + 20, FH + 20, DEEP), d = px(FW + 20, -20, DEEP);
                return <polygon points={[a, b, c, d].map(p => `${OX + p.left},${OY + p.top}`).join(" ")} fill="rgba(120,140,150,.10)" stroke="#bcd0d7" strokeWidth="1.4" />; })()}
            </svg>

            {/* ステージ見出し */}
            {STAGES.map((s, i) => {
              const p = wrap(px(i * (CW + GX), 0, 0));
              const isOpen = openStage === s.n;
              const built = !!(PLAN[s.n] && PLAN[s.n][0] && PLAN[s.n][0].ready);
              return (
                <button key={s.n} onClick={() => { setOpenStage(s.n); setOpenLv(0); }} style={{
                  position: "absolute", ...p, width: CW, height: HEADER - 6,
                  background: isOpen ? BLUE : "#EAF2FC", color: isOpen ? "#fff" : INK,
                  border: `2px solid ${BLUE}`, borderRadius: 8, cursor: "pointer", padding: "5px 8px", boxSizing: "border-box", textAlign: "left",
                  boxShadow: isOpen ? "0 4px 12px rgba(58,123,213,.35)" : "none",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ width: 19, height: 19, borderRadius: "50%", background: isOpen ? "#fff" : BLUE, color: isOpen ? BLUE : "#fff", fontSize: 10.5, fontWeight: 900, display: "grid", placeItems: "center", flex: "none" }}>{s.n}</span>
                    <span style={{ fontSize: 11.5, fontWeight: 900, lineHeight: 1.0 }}>{s.title}<br /><span style={{ fontSize: 8.5, opacity: .85, fontWeight: 800 }}>{s.sub}</span></span>
                  </div>
                  <div style={{ fontSize: 8, fontWeight: 800, color: isOpen ? "#cfe0ff" : (built ? GREEN : SUB), textAlign: "right", marginTop: 1 }}>{built ? "✓つかえる" : "じゅんび中"}</div>
                </button>
              );
            })}

            {/* 深度マス */}
            {STAGES.map((s, i) =>
              DEPTH.map((d, k) => {
                const p = wrap(px(i * (CW + GX), HEADER + k * CH, 0));
                const isDone = !!done[`${s.n}-${k}`];
                const isOpenCell = openStage === s.n && openLv === k;
                return (
                  <div key={`${s.n}-${k}-${isDone ? 1 : 0}`} onClick={() => { setOpenStage(s.n); setOpenLv(k); }} style={{
                    position: "absolute", ...p, width: CW, height: CH - 6,
                    background: isDone ? AMBER[k] : "#fff", border: `2px solid ${AMBER_DK[k]}`,
                    outline: isOpenCell ? `3px solid ${AMBER_DK[k]}` : "none",
                    borderRadius: 7, cursor: "pointer", boxSizing: "border-box", display: "flex", alignItems: "center", gap: 2,
                    animation: isDone ? "cellPop .3s ease" : "none",
                  }}>
                    <span style={{ width: 7, height: "100%", background: AMBER_DK[k], borderRadius: "5px 0 0 5px", flex: "none" }} />
                    <span style={{ fontSize: 12, flex: "none", marginLeft: 1 }}>{d.badge}</span>
                    <span style={{ fontSize: 11.5, fontWeight: 900, color: isDone ? INK : AMBER_DK[k], flex: 1, whiteSpace: "nowrap", overflow: "hidden", letterSpacing: "-0.3px" }}>{d.name}</span>
                    <span style={{ fontSize: 8, fontWeight: 800, color: isDone ? INK : AMBER_DK[k], paddingRight: 4, flex: "none" }}>L{d.lv}</span>
                  </div>
                );
              })
            )}

/* ===== 無限：小数のたし算 ===== */
function InfiniteDecimalAdd() {
  const gen = () => {
    const a = (Math.floor(Math.random() * 89) + 10) / 10; // 1.0〜9.9
    const b = (Math.floor(Math.random() * 89) + 10) / 10;
    return { a, b, ans: Math.round((a + b) * 10) / 10 };
  };
  const [q, setQ] = useState(gen);
  const [val, setVal] = useState("");
  const [judge, setJudge] = useState(null); // "ok"|"ng"|null
  const [streak, setStreak] = useState(0);
  const [count, setCount] = useState(0);
  const inputRef = useRef(null);

  const check = () => {
    if (val === "") return;
    const ok = Math.abs(parseFloat(val) - q.ans) < 1e-9;
    setJudge(ok ? "ok" : "ng");
    setCount((c) => c + 1);
    setStreak((s) => (ok ? s + 1 : 0));
  };
  const next = () => { setQ(gen()); setVal(""); setJudge(null); if (inputRef.current) inputRef.current.focus(); };
  const onKey = (e) => { if (e.key === "Enter") { judge ? next() : check(); } };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, fontWeight: 800, color: SUB, marginBottom: 8 }}>
        <span>れんぞく正かい：<b style={{ color: GREEN_TX }}>{streak}</b></span>
        <span>といた数：{count}</span>
      </div>
      <div style={{ background: "#F3EDFB", border: `2px solid ${AMBER_MAIN}`, borderRadius: 12, padding: "16px 14px", textAlign: "center" }}>
        <div style={{ fontSize: 28, fontWeight: 900, color: INK, letterSpacing: 1 }}>
          {q.a.toFixed(1)} <span style={{ color: AMBER_MAIN }}>+</span> {q.b.toFixed(1)} =
        </div>
        <input
          ref={inputRef} value={val} onChange={(e) => setVal(e.target.value)} onKeyDown={onKey}
          inputMode="decimal" placeholder="答え"
          style={{ marginTop: 12, width: 130, fontSize: 22, fontWeight: 900, textAlign: "center", color: INK, border: `2px solid ${judge === "ok" ? GREEN : judge === "ng" ? "#D85A30" : "#cdd8dd"}`, borderRadius: 10, padding: "6px 8px", outline: "none" }}
        />
        <div style={{ marginTop: 8, fontSize: 10.5, fontWeight: 700, color: SUB }}>小数点を そろえて 計算しよう（位をそろえる）</div>
      </div>

      {judge && (
        <div style={{ marginTop: 10, textAlign: "center", fontSize: 15, fontWeight: 900, color: judge === "ok" ? GREEN : "#D85A30" }}>
          {judge === "ok" ? "⭕ せいかい！" : `❌ おしい… 答えは ${q.ans.toFixed(1)}`}
        </div>
      )}

      <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
        {!judge
          ? <button onClick={check} style={btnMain(AMBER_MAIN)}>こたえあわせ</button>
          : <button onClick={next} style={btnMain(GREEN)}>つぎの問題 →</button>}
      </div>
    </div>
  );
}
const btnMain = (c) => ({ flex: 1, fontSize: 14, fontWeight: 900, cursor: "pointer", color: "#fff", background: c, border: "none", borderRadius: 10, padding: "11px 0" });

/* ===== 無限：汎用クイズ（make()が {display, ans, ansText} を返す） ===== */
function InfiniteQuiz({ make, hint, mode }) {
  const [q, setQ] = useState(make);
  const [val, setVal] = useState("");
  const [judge, setJudge] = useState(null);
  const [streak, setStreak] = useState(0);
  const [count, setCount] = useState(0);
  const inputRef = useRef(null);
  const check = () => {
    if (val.trim() === "") return;
    const ok = Math.abs(parseFloat(val) - q.ans) < 1e-9;
    setJudge(ok ? "ok" : "ng");
    setCount((c) => c + 1);
    setStreak((s) => (ok ? s + 1 : 0));
  };
  const next = () => { setQ(make()); setVal(""); setJudge(null); if (inputRef.current) inputRef.current.focus(); };
  const onKey = (e) => { if (e.key === "Enter") { judge ? next() : check(); } };
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, fontWeight: 800, color: SUB, marginBottom: 8 }}>
        <span>れんぞく正かい：<b style={{ color: GREEN_TX }}>{streak}</b></span>
        <span>といた数：{count}</span>
      </div>
      <div style={{ background: "#F3EDFB", border: `2px solid ${AMBER_MAIN}`, borderRadius: 12, padding: "16px 14px", textAlign: "center" }}>
        <div style={{ fontSize: 25, fontWeight: 900, color: INK, letterSpacing: 1, lineHeight: 1.3 }}>{q.display}</div>
        <input
          ref={inputRef} value={val} onChange={(e) => setVal(e.target.value)} onKeyDown={onKey}
          inputMode={mode || "numeric"} placeholder="答え"
          style={{ marginTop: 12, width: 130, fontSize: 22, fontWeight: 900, textAlign: "center", color: INK, border: `2px solid ${judge === "ok" ? GREEN : judge === "ng" ? "#D85A30" : "#cdd8dd"}`, borderRadius: 10, padding: "6px 8px", outline: "none" }}
        />
        {hint && <div style={{ marginTop: 8, fontSize: 10.5, fontWeight: 700, color: SUB }}>{hint}</div>}
      </div>
      {judge && (
        <div style={{ marginTop: 10, textAlign: "center", fontSize: 15, fontWeight: 900, color: judge === "ok" ? GREEN : "#D85A30" }}>
          {judge === "ok" ? "⭕ せいかい！" : `❌ おしい… 答えは ${q.ansText}`}
        </div>
      )}
      <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
        {!judge
          ? <button onClick={check} style={btnMain(AMBER_MAIN)}>こたえあわせ</button>
          : <button onClick={next} style={btnMain(GREEN)}>つぎの問題 →</button>}
      </div>
    </div>
  );
}

/* 大きい数：位（くらい）クイズ */
const PLACE_NAMES = ["一", "十", "百", "千", "万", "十万"];
function makeBigPlace() {
  const digits = 4 + Math.floor(Math.random() * 3); // 4〜6けた
  let s = String(Math.floor(Math.random() * 9) + 1);
  for (let i = 1; i < digits; i++) s += String(Math.floor(Math.random() * 10));
  const place = Math.floor(Math.random() * digits); // 0=一の位
  const digit = Number(s[s.length - 1 - place]);
  return { display: `${s} の「${PLACE_NAMES[place]}の位」の 数字は？`, ans: digit, ansText: String(digit) };
}
function InfiniteBigPlace() { return <InfiniteQuiz make={makeBigPlace} mode="numeric" hint="右から かぞえよう：一・十・百・千・万…" />; }

/* かけ算：2けた×1けた */
function makeMul() {
  const a = Math.floor(Math.random() * 90) + 10; // 10〜99
  const b = Math.floor(Math.random() * 8) + 2;   // 2〜9
  return { display: `${a} × ${b} ＝`, ans: a * b, ansText: String(a * b) };
}
function InfiniteMul() { return <InfiniteQuiz make={makeMul} mode="numeric" hint="位ごとに 分けて：（一の位×）と（十の位×）を たす" />; }

/* 整数：たし算・ひき算 ミックス */
function makeIntMix() {
  if (Math.random() < 0.5) {
    const a = Math.floor(Math.random() * 900) + 100; // 100〜999
    const b = Math.floor(Math.random() * 900) + 100;
    return { display: `${a} ＋ ${b} ＝`, ans: a + b, ansText: String(a + b) };
  }
  let a = Math.floor(Math.random() * 900) + 100, b = Math.floor(Math.random() * 900) + 100;
  if (b > a) { const t = a; a = b; b = t; }
  return { display: `${a} − ${b} ＝`, ans: a - b, ansText: String(a - b) };
}
function InfiniteIntMix() { return <InfiniteQuiz make={makeIntMix} mode="numeric" hint="位をそろえて 一の位から 計算しよう" />; }

/* ===== ∞チャレンジ問題：ジェネレータ登録制 =====
   新しい無限問題を 足すとき：
   ①上のように コンポーネントを作る（例：function InfiniteXxx(){...}）
   ②下の GENERATORS に  キー: コンポーネント  を 1行 追加
   ③単元データの NEXT_CARDS で その カードに  gen:"キー"  を 指定する
   これだけで「つなげる」裏面の チャレンジ欄に つながる。 */
const GENERATORS = {
  decimalAdd: InfiniteDecimalAdd,
  bigPlace: InfiniteBigPlace,
  mul2x1: InfiniteMul,
  intMix: InfiniteIntMix,
};

/* ===== PBL：ショッピングモール ===== */
function PblShopping({ items, budget, setBudget, cart, setCart, allClear, stagesReached, N, onClose }) {
  const toggle = (id) => setCart((c) => { const x = { ...c }; if (x[id]) delete x[id]; else x[id] = true; return x; });
  const lines = items.filter((it) => cart[it.id]).map((it) => ({ ...it, sub: it.price }));
  const total = lines.reduce((s, l) => s + l.sub, 0);
  const rest = budget - total;
  const over = rest < 0;
  const itemCount = lines.length;

  // 答え合わせ（自分で計算 → 入力 → 判定）
  const [ansTotal, setAnsTotal] = React.useState("");
  const [ansRest, setAnsRest] = React.useState("");
  const [checked, setChecked] = React.useState(false);
  const totalOK = checked && parseInt(ansTotal, 10) === total;
  const restOK = checked && parseInt(ansRest, 10) === rest;
  const bothOK = totalOK && restOK;
  // 選んだ品が変わったら 答え合わせを リセット
  const cartKey = lines.map((l) => l.id).join(",");
  React.useEffect(() => { setChecked(false); setAnsTotal(""); setAnsRest(""); }, [cartKey, budget]);
  const reveal = checked && bothOK; // 正解したときだけ 合計・残りを見せる（まちがいで答えを写せないように）
  // 採点：予算内で、残りが少ないほど高評価
  const usedRate = budget > 0 ? total / budget : 0;
  let stars = 0, rank = "—";
  if (lines.length > 0 && !over) {
    if (rest === 0) { stars = 3; rank = "ぴったり賞！"; }
    else if (usedRate >= 0.9) { stars = 3; rank = "たつじん級"; }
    else if (usedRate >= 0.7) { stars = 2; rank = "じょうずに やりくり"; }
    else { stars = 1; rank = "まだ よゆうが あるよ"; }
  }
  // 次の問いの芽：いちばん高い品を3人分（かけ算）／予算を2人で半分こ（わり算）
  const topItem = lines.slice().sort((a, b) => b.price - a.price)[0] || null;
  const mulAnswer = topItem ? topItem.price * 3 : null;
  const halfBudget = Math.floor(budget / 2);

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(20,40,45,.45)", zIndex: 50, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "18px", overflow: "auto" }}>

          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ fontSize: 11, fontWeight: 800, opacity: .92 }}>たし算・ひき算の筆算を つかう PBL（探究）</div>
            <div style={{ fontSize: 20, fontWeight: 900 }}>ショッピングモールで お買いもの大さくせん</div>
          </div>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,.25)", color: "#fff", border: "none", borderRadius: 9, padding: "6px 14px", fontWeight: 900, cursor: "pointer", fontSize: 13 }}>とじる ✕</button>
        </div>

        <div style={{ padding: "16px 18px" }}>
          {/* ミッション */}
          <div style={{ background: "#F4FAFB", border: `2px solid ${AQUA}`, borderRadius: 12, padding: "11px 14px", marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 900, color: BLUE, marginBottom: 4 }}>🎯 ミッション：家族みんなへ おみやげを 予算内で 買おう</div>

                          <AnsField label="のこりHP" unit="" value={ansRem} onChange={setAnsRem} ok={checked ? remOK : null} />

                            : <button onClick={() => { setChecked(false); setAnsDmg(""); setAnsRem(""); }} style={{ flex: 1, fontSize: 13, fontWeight: 900, cursor: "pointer", color: AMBER_MAIN, background: "#fff", border: `2px solid ${AMBER_MAIN}`, borderRadius: 10, padding: "9px 0" }}>もう一回 計算</button>}
                        </div>
                        {checked && (

                            {bothOK ? (win ? "⭕ せいかい！ ボスを たおした！" : `⭕ せいかい！ HP ${currentHP.toLocaleString()} → ${rem.toLocaleString()}！`) : `${dmgOK ? "ダメージ○" : "ダメージ×"} ／ ${remOK ? "のこり○" : "のこり×"}　もう一回`}
                          </div>

                          <button onClick={nextBoss} style={{ marginTop: 10, width: "100%", fontSize: 14, fontWeight: 900, cursor: "pointer", color: "#fff", background: BATTLE_COLOR, border: "none", borderRadius: 10, padding: "11px 0" }}>{level + 1 < BATTLE_BOSSES.length ? "つぎの ボスへ →" : "さいごの ボスを たおした！ →"}</button>

            </>

        </div>
      </div>
    </div>
  );

/* ===== PBL：暗号たんてい（筆算をといて 金庫をひらく） ===== */
const DETECTIVE_COLOR = "#4A5BA6";
function makeCipherCase() {
  const R = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
  const a1 = R(100, 999), b1 = R(100, 999), ans1 = a1 + b1;
  const a2 = R(300, 999), b2 = R(1, a2 - 100), ans2 = a2 - b2;
  const a3 = R(100, 999), b3 = R(100, 999), ans3 = a3 + b3;
  return [
    { op: "＋", a: a1, b: b1, ans: ans1, place: "百の位", clue: Math.floor(ans1 / 100) % 10 },
    { op: "−", a: a2, b: b2, ans: ans2, place: "十の位", clue: Math.floor(ans2 / 10) % 10 },
    { op: "＋", a: a3, b: b3, ans: ans3, place: "一の位", clue: ans3 % 10 },
  ];
}
function CipherDetective({ onClose }) {
  const [cs, setCs] = React.useState(makeCipherCase);
  const [inputs, setInputs] = React.useState(["", "", ""]);
  const [solved, setSolved] = React.useState([false, false, false]);
  const [judges, setJudges] = React.useState([null, null, null]);
  const allSolved = solved.every(Boolean);

  const setInput = (i, v) => setInputs((a) => { const x = [...a]; x[i] = v; return x; });
  const check = (i) => {
    if (inputs[i].trim() === "") return;
    const ok = parseInt(inputs[i], 10) === cs[i].ans;
    setJudges((a) => { const x = [...a]; x[i] = ok ? "ok" : "ng"; return x; });
    if (ok) setSolved((a) => { const x = [...a]; x[i] = true; return x; });
  };
  const nextCase = () => { setCs(makeCipherCase()); setInputs(["", "", ""]); setSolved([false, false, false]); setJudges([null, null, null]); };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(20,40,45,.45)", zIndex: 50, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: 18, overflow: "auto" }}>
      <div style={{ width: "min(900px, 100%)", background: "#fff", borderRadius: 18, overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,.3)" }}>
        <div style={{ background: `linear-gradient(180deg, #5E6FBE, ${DETECTIVE_COLOR})`, color: "#fff", padding: "14px 18px", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <span style={{ fontSize: 26 }}>🕵️</span>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ fontSize: 11, fontWeight: 800, opacity: .92 }}>筆算で あんごうを とく PBL（位を よみとれ！）</div>
            <div style={{ fontSize: 20, fontWeight: 900 }}>暗号たんてい — きんこを ひらけ！</div>
          </div>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,.25)", color: "#fff", border: "none", borderRadius: 9, padding: "6px 14px", fontWeight: 900, cursor: "pointer", fontSize: 13 }}>とじる ✕</button>
        </div>

        <div style={{ padding: "16px 18px" }}>
          <div style={{ background: "#EEF0FA", border: `2px solid ${DETECTIVE_COLOR}`, borderRadius: 12, padding: "11px 14px", marginBottom: 14, fontSize: 13, fontWeight: 700, color: INK, lineHeight: 1.6 }}>
            🎯 3つの 筆算を とこう。答えの <b style={{ color: DETECTIVE_COLOR }}>指定された位（くらい）の数字</b>が、金庫の あんごうに なるよ。3つ そろえば 金庫が ひらく！
          </div>

          {/* 金庫 */}
          <div style={{ textAlign: "center", marginBottom: 16 }}>
            <div style={{ fontSize: 44, lineHeight: 1 }}>{allSolved ? "🔓" : "🔒"}</div>
            <div style={{ fontSize: 12, fontWeight: 800, color: SUB, marginTop: 2 }}>きんこの あんごう</div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 6 }}>
              {cs.map((p, i) => (
                <div key={i} style={{ width: 52, height: 60, borderRadius: 10, border: `3px solid ${solved[i] ? DETECTIVE_COLOR : "#cdd8dd"}`, background: solved[i] ? "#EEF0FA" : "#fff", display: "grid", placeItems: "center", fontSize: 30, fontWeight: 900, color: solved[i] ? DETECTIVE_COLOR : "#cdd8dd" }}>
                  {solved[i] ? p.clue : "?"}
                </div>
              ))}
            </div>
          </div>

          {/* 3つの じけん */}
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {cs.map((p, i) => {
              const j = judges[i];
              return (
                <div key={i} style={{ border: `2px solid ${solved[i] ? GREEN : "#e0e8ea"}`, borderRadius: 12, padding: "11px 13px", background: solved[i] ? "#EAF7F1" : "#fff" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 11, fontWeight: 900, color: "#fff", background: DETECTIVE_COLOR, borderRadius: 8, padding: "2px 9px" }}>じけん {i + 1}</span>
                    <span style={{ fontSize: 22, fontWeight: 900, color: INK, letterSpacing: 1 }}>{p.a} {p.op} {p.b} ＝</span>
                    {!solved[i] ? (
                      <>
                        <input value={inputs[i]} onChange={(e) => setInput(i, e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") check(i); }} inputMode="numeric" placeholder="答え"
                          style={{ width: 100, fontSize: 20, fontWeight: 900, textAlign: "center", color: INK, border: `2px solid ${j === "ng" ? "#D85A30" : "#cdd8dd"}`, borderRadius: 9, padding: "5px 6px", outline: "none" }} />
                        <button onClick={() => check(i)} style={{ fontSize: 13, fontWeight: 900, cursor: "pointer", color: "#fff", background: DETECTIVE_COLOR, border: "none", borderRadius: 9, padding: "8px 14px" }}>たしかめ</button>
                        {j === "ng" && <span style={{ fontSize: 13, fontWeight: 900, color: "#D85A30" }}>❌ もう一回</span>}
                      </>
                    ) : (
                      <span style={{ fontSize: 15, fontWeight: 900, color: GREEN }}>✓ {p.ans}　→ 【{p.place}】は <b style={{ color: DETECTIVE_COLOR }}>{p.clue}</b>！</span>
                    )}
                  </div>
                  <div style={{ marginTop: 6, fontSize: 11, fontWeight: 800, color: solved[i] ? GREEN_TX : SUB }}>🔎 答えの【{p.place}】の 数字が、あんごうの {i + 1}番目</div>
                </div>
              );
            })}
          </div>

          {allSolved && (
            <div style={{ marginTop: 16, textAlign: "center", border: `2px solid ${DETECTIVE_COLOR}`, borderRadius: 14, padding: "16px 14px", background: "#EEF0FA" }}>
              <div style={{ fontSize: 40 }}>🔓🎁</div>
              <div style={{ fontSize: 19, fontWeight: 900, color: DETECTIVE_COLOR, marginTop: 4 }}>あんごう「{cs.map((p) => p.clue).join("")}」で 金庫が ひらいた！</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: SUB, marginTop: 6 }}>名たんてい！ つぎの じけんに ちょうせんしよう。</div>
              <button onClick={nextCase} style={{ marginTop: 14, fontSize: 14, fontWeight: 900, cursor: "pointer", color: "#fff", background: DETECTIVE_COLOR, border: "none", borderRadius: 11, padding: "11px 24px" }}>つぎの じけん →</button>
            </div>
          )}

          <div style={{ marginTop: 14, fontSize: 10.5, fontWeight: 700, color: SUB, background: "#f3f8fa", borderRadius: 8, padding: "8px 11px", lineHeight: 1.5 }}>
            💡 「百の位・十の位・一の位」を まちがえないように、ひっ算は 位をそろえて。位を よみとる力が たんていの ぶきだ！
          </div>
        </div>
      </div>
    </div>
  );
}

function AnsField({ label, unit, value, onChange, ok }) {
  const border = ok === null ? "#cdd8dd" : ok ? GREEN : "#D85A30";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <span style={{ fontSize: 12.5, fontWeight: 800, color: INK, width: 70, flex: "none" }}>{label}</span>
      <input type="number" value={value} onChange={(e) => onChange(e.target.value)} placeholder="答え"
        style={{ flex: 1, minWidth: 0, fontSize: 17, fontWeight: 900, color: INK, textAlign: "right", border: `2px solid ${border}`, borderRadius: 9, padding: "6px 9px", outline: "none" }} />
      <span style={{ fontSize: 13, fontWeight: 900, flex: "none" }}>{unit}</span>
      {ok !== null && <span style={{ fontSize: 17, fontWeight: 900, color: ok ? GREEN : "#D85A30", width: 18, flex: "none" }}>{ok ? "○" : "×"}</span>}
    </div>
  );
}
function Row({ label, value, color, big }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: big ? "3px 0" : "2px 0" }}>
      <span style={{ fontSize: big ? 12.5 : 11, fontWeight: 800, color: color }}>{label}</span>
      <span style={{ fontSize: big ? 19 : 13, fontWeight: 900, color: color }}>{value}</span>
    </div>
  );
}

/* 「つまずきレスキュー隊」カードの色（旧ミニ授業ボード由来の名残） */
const MINI_COLOR = "#E8731C";


/* ===== 小物 ===== */
function LinkChip({ item, block }) {
  const base = { fontSize: 11, fontWeight: 800, borderRadius: 11, padding: "5px 11px", textDecoration: "none", display: block ? "block" : "inline-block" };
  const has = item && item.url;
  if (has) {
    return <a href={item.url} target="_blank" rel="noreferrer" style={{ ...base, color: "#fff", background: GREEN, border: `1.5px solid ${GREEN}` }}>{item.t} ↗</a>;
  }
  return <span style={{ ...base, color: SUB, border: "1.5px dashed #cdd8dd", background: "#fff" }}>{item.t}</span>;
}
function SectionTitle({ color, icon, text, mt }) {
  return <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, fontWeight: 900, color, margin: mt ? "12px 0 6px" : "0 0 6px" }}><span>{icon}</span>{text}</div>;
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
